<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiMemo — AI 智能记事本</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
</head>
<body>
  <!-- API Key 配置弹窗 -->
  <div id="api-key-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-badge">CONFIG</div>
      <h2>配置 MiMo API Key</h2>
      <p class="modal-desc">输入你的 Xiaomi MiMo API Key 以启用 AI 功能</p>
      <div class="input-group">
        <input type="password" id="api-key-input" placeholder="sk-..." autocomplete="off">
        <button id="toggle-key-vis" class="input-icon" title="显示/隐藏">👁</button>
      </div>
      <div class="modal-actions">
        <button id="api-key-cancel" class="btn btn-ghost">取消</button>
        <button id="api-key-save" class="btn btn-accent">保存</button>
      </div>
      <p class="hint" id="api-key-hint">API Key 仅存储在本地浏览器中，不会上传到任何服务器</p>
    </div>
  </div>

  <!-- 主布局 -->
  <div class="app">
    <!-- 顶部导航 -->
    <header class="header">
      <div class="header-left">
        <div class="logo-mark">M</div>
        <div class="logo-text">
          <h1>MiMemo</h1>
          <span class="tagline">AI · 笔记 · 思考</span>
        </div>
      </div>
      <div class="header-right">
        <div class="search-box">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="search-input" placeholder="搜索笔记...">
          <button id="search-clear" class="search-clear hidden">&times;</button>
        </div>
        <button id="btn-settings" class="btn-icon" title="设置 API Key">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button id="btn-theme" class="btn-icon" title="切换主题">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <div class="main">
      <!-- 侧边栏 -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <button id="btn-new-note" class="btn btn-new">
            <span class="btn-new-icon">+</span>
            <span>新建笔记</span>
          </button>
        </div>
        <div id="tag-filter" class="tag-filter hidden">
          <span class="tag-filter-label">筛选</span>
          <span id="active-tag" class="tag-chip active"></span>
          <button id="clear-tag-filter" class="tag-clear">&times;</button>
        </div>
        <div id="note-list" class="note-list"></div>
      </aside>

      <!-- 编辑区 -->
      <main class="editor-area">
        <!-- 空状态 -->
        <div id="empty-state" class="empty-state">
          <div class="empty-visual">
            <div class="empty-line"></div>
            <div class="empty-line short"></div>
            <div class="empty-line"></div>
            <div class="empty-line short"></div>
          </div>
          <h2>开始记录</h2>
          <p>点击「新建笔记」或从左侧选择已有笔记</p>
        </div>

        <!-- 编辑器 -->
        <div id="editor-container" class="editor-container hidden">
          <div class="editor-header">
            <input type="text" id="note-title" placeholder="笔记标题" class="title-input">
            <div class="editor-actions">
              <button id="btn-export" class="btn btn-outline" title="导出 Markdown">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                <span>导出</span>
              </button>
              <button id="btn-delete" class="btn btn-outline btn-danger" title="删除笔记">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                <span>删除</span>
              </button>
            </div>
          </div>

          <div class="editor-body">
            <textarea id="note-content" placeholder="在这里写下你的笔记...&#10;&#10;支持 Markdown 格式"></textarea>
          </div>

          <!-- 标签 -->
          <div class="editor-footer">
            <div class="tags-row">
              <svg class="tags-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
              <div id="note-tags" class="tags-container"></div>
            </div>
          </div>

          <!-- AI 功能区 -->
          <div class="ai-section">
            <div class="ai-actions">
              <button id="btn-ai-summary" class="btn btn-ai">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10 4 4 0 0 1-5-5 4 4 0 0 1-5-5"/><path d="M8.5 8.5v.01"/><path d="M16 15.5v.01"/><path d="M12 12v.01"/><path d="M11 17v.01"/><path d="M7 14v.01"/></svg>
                <span>AI 摘要</span>
              </button>
              <button id="btn-ai-tags" class="btn btn-ai">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                <span>AI 提取标签</span>
              </button>
            </div>

            <!-- AI 加载中 -->
            <div id="ai-loading" class="ai-loading hidden">
              <div class="ai-loading-dots">
                <span></span><span></span><span></span>
              </div>
              <span>AI 正在思考...</span>
            </div>

            <!-- AI 结果 -->
            <div id="ai-result" class="ai-result hidden">
              <div class="ai-result-header">
                <div class="ai-result-badge">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10 4 4 0 0 1-5-5 4 4 0 0 1-5-5"/></svg>
                  <span id="ai-result-type"></span>
                </div>
                <button id="btn-ai-close" class="ai-close">&times;</button>
              </div>
              <div id="ai-result-content" class="ai-result-content"></div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
